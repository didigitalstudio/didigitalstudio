<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14"/>
      <stop offset="0.55" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#07070b"/>
    </linearGradient>
    <radialGradient id="glow-1" cx="0.18" cy="0.25" r="0.45">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#07070b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="0.85" cy="0.78" r="0.4">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="0.7" stop-color="#ec4899" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#07070b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="logo-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="logo-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#07070B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logo-dot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow-1)"/>
  <rect width="1200" height="630" fill="url(#glow-2)"/>

  <!-- Logo -->
  <g transform="translate(80, 80) scale(0.9)">
    <circle cx="100" cy="100" r="64" fill="url(#logo-glow)"/>
    <path d="M52 48 H92 C118 48 138 71 138 100 C138 129 118 152 92 152 H52 Z" stroke="url(#logo-stroke)" stroke-width="8" stroke-linejoin="round" fill="none"/>
    <rect x="152" y="84" width="10" height="68" rx="3" fill="url(#logo-stroke)"/>
    <circle cx="157" cy="62" r="8" fill="url(#logo-dot)"/>
    <circle cx="157" cy="62" r="14" fill="none" stroke="url(#logo-stroke)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="157" cy="62" r="20" fill="none" stroke="url(#logo-stroke)" stroke-width="0.6" opacity="0.25"/>
  </g>

  <!-- Brand wordmark -->
  <text x="280" y="170" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="44" fill="#f5f5f7" letter-spacing="0">DI</text>
  <text x="338" y="170" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="44" fill="#a1a1aa">Digital Studio</text>

  <!-- Headline -->
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="76" fill="#f5f5f7">Software a medida</text>
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="76" fill="url(#text-grad)">para tu negocio.</text>

  <!-- Tagline -->
  <text x="80" y="540" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#a1a1aa">SaaS · Webapps · Automatizaciones · Integraciones IA</text>

  <!-- Footer line -->
  <text x="80" y="585" font-family="JetBrains Mono, monospace" font-weight="500" font-size="20" fill="#71717a">didigitalstudio.com · Buenos Aires · Argentina</text>

  <!-- Decorative chips -->
  <g transform="translate(900, 380)">
    <circle r="4" fill="#22d3ee" opacity="0.8"/>
    <circle r="14" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <circle r="28" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.15"/>
  </g>
</svg>
