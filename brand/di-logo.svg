<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="DI Digital Studio">
  <title>DI Digital Studio</title>
  <desc>Logo del estudio de software DI Digital Studio</desc>
  <defs>
